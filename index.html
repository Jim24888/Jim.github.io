                            200: '#E5E7EB',

                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }

        }

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .sidebar-item-active {
                @apply bg-blue-600 text-white;
            }
            .progress-bar {
                @apply h-2 rounded-full bg-gray-200 overflow-hidden;
            }
            .progress-bar-fill {
                @apply h-full bg-blue-500 transition-all duration-300;
            }
            .status-tag {
                @apply px-2 py-0.5 rounded text-xs font-medium;
            }
        }

        /* 需求文档面板样式 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        #reqDocPanel { transition: box-shadow 0.2s ease; }
        #reqDocPanel:hover { box-shadow: 0 20px 40px rgba(0,0,0,0.18); }
        #reqDocContent p { margin-bottom: 10px; }
        #reqDocContent ul { list-style: disc inside; padding-left: 8px; margin-bottom: 10px; }
        #reqDocContent li { margin-bottom: 6px; line-height: 1.7; }
        #reqDocDots span { transition: all 0.25s ease; cursor: pointer; }
        #reqDocDots span.active { transform: scale(1.3); }
        .req-section-title { color: #1e293b; font-weight: 700; font-size: 14px; margin-bottom: 8px; padding-left: 8px; border-left: 3px solid #3b82f6; }
        .req-highlight { background: linear-gradient(120deg, #dbeafe 0%, #bfdbfe 100%); padding: 12px 16px; border-radius: 8px; margin: 12px 0; }
        .req-table-mini { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
        .req-table-mini th, .req-table-mini td { border: 1px solid #e2e8f0; padding: 6px 10px; text-align: left; }
        .req-table-mini th { background: #f8fafc; font-weight: 600; color: #475569; }
        .req-badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
        .req-badge-new { background: #dcfce7; color: #166534; }
        .req-badge-old { background: #f1f5f9; color: #475569; }
        .req-flow-step { position: relative; padding-left: 24px; margin-bottom: 16px; }
        .req-flow-step::before { content: ''; position: absolute; left: 7px; top: 28px; bottom: -16px; width: 2px; background: #e2e8f0; }
        .req-flow-step:last-child::before { display: none; }
        .req-flow-num { position: absolute; left: 0; top: 0; width: 16px; height: 16px; border-radius: 50%; background: #3b82f6; color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

<body class="bg-gray-100 font-sans text-gray-800">

                <span class="text-sm">卢佩诗</span>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <div class="flex pt-12 h-screen">
        <!-- 左侧侧边栏 -->
        <aside class="w-48 bg-gray-800 text-white h-full overflow-y-auto">
            <nav class="py-2">
                <a href="#" class="flex items-center px-4 py-2.5 text-sm hover:bg-gray-700">
                    <i class="fa fa-table mr-3 w-4 text-center"></i>
                    报表导出列表
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-sm hover:bg-gray-700">
                    <i class="fa fa-bell mr-3 w-4 text-center"></i>
                    头条消息推送设置
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-sm sidebar-item-active">
                    <i class="fa fa-tasks mr-3 w-4 text-center"></i>
                    任务中心列表
                </a>
                <div class="border-t border-gray-700 my-1"></div>
                <div class="px-4 py-2">
                    <button class="flex items-center justify-between w-full text-sm hover:text-gray-200">
                        <span class="flex items-center">
                            <i class="fa fa-refresh mr-3 w-4 text-center"></i>

                        </span>
                        <i class="fa fa-chevron-down text-xs"></i>

            <!-- 筛选栏 - 带联动功能 -->
            <div class="bg-white rounded shadow-sm p-4 mb-4">

                    <div class="flex items-center">
                        <label class="text-sm text-gray-600 mr-2">创建时间</label>
                        <div class="flex items-center">
                            <input type="date" class="border border-gray-300 rounded px-2 py-1 text-sm w-36">
                            <span class="mx-2 text-gray-500">→</span>
                            <input type="date" class="border border-gray-300 rounded px-2 py-1 text-sm w-36">
                            <button class="ml-1 text-gray-500 hover:text-gray-700">
                                <i class="fa fa-calendar-o"></i>
                            </button>
                        </div>
                    </div>
                    <!-- 主任务类型 -->
                    <div class="flex items-center">
                        <label class="text-sm text-gray-600 mr-2">主任务类型</label>
                        <select id="mainTaskType" class="border border-gray-300 rounded px-2 py-1 text-sm w-48" onchange="changeSubTask()">
                            <option value="">全部</option>
                            <option value="material">素材关停任务</option>
                            <option value="ad_config">广告配置批量调整任务</option>
                        </select>
                    </div>
                    <!-- 子任务类型 -->
                    <div class="flex items-center">
                        <label class="text-sm text-gray-600 mr-2">子任务类型</label>
                        <select id="subTaskType" class="border border-gray-300 rounded px-2 py-1 text-sm w-56">
                            <option value="">全部</option>
                        </select>
                    </div>
                    <!-- 任务状态 -->
                    <div class="flex items-center">
                        <label class="text-sm text-gray-600 mr-2">任务状态</label>
                        <select id="taskStatus" class="border border-gray-300 rounded px-2 py-1 text-sm w-48" onchange="filterTable()">
                            <option value="">请选择任务状态</option>
                            <option value="pending">等待执行</option>
                            <option value="running">正在执行</option>
                            <option value="completed">已完成</option>
                            <option value="partial_success">部分成功</option>
                            <option value="cancelled">已取消</option>
                            <option value="failed">失败</option>
                        </select>
                    </div>
                    <!-- 媒体类型 -->
                    <div class="flex items-center">
                        <label class="text-sm text-gray-600 mr-2">媒体类型</label>
                        <select id="mediaType" class="border border-gray-300 rounded px-2 py-1 text-sm w-32" onchange="changeSubTask()">

                            <option value="toutiao" selected>头条</option>
                            <option value="tencent">腾讯</option>
                        </select>
                    </div>

        // 子任务联动切换函数
        function changeSubTask() {
            const mainType = document.getElementById('mainTaskType').value;
            const mediaType = document.getElementById('mediaType').value;
            const subSelect = document.getElementById('subTaskType');
            
            // 清空子任务选项
            subSelect.innerHTML = '<option value="">全部</option>';
            
            // 根据主任务类型加载对应子任务
            if (mainType === 'material') {
                // 素材关停任务：加载固定子任务
                taskConfig.material.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.value;
                    option.textContent = item.label;
                    subSelect.appendChild(option);
                });
            } else if (mainType === 'ad_config') {
                // 广告配置调整任务：根据媒体类型加载
                if (mediaType === 'toutiao') {
                    taskConfig.ad_config_toutiao.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.value;
                        option.textContent = item.label;
                        subSelect.appendChild(option);
                    });
                } else if (mediaType === 'tencent') {
                    taskConfig.ad_config_tencent.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.value;
                        option.textContent = item.label;
                        subSelect.appendChild(option);
                    });
                } else if (mediaType === '') {
                    // 媒体类型为全部时，显示提示
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = '-- 请先选择媒体类型 --';
                    option.disabled = true;
                    subSelect.appendChild(option);
                }
            }

            // 自动触发查询刷新表格
            filterTable();
        }

        // 过滤并渲染表格
        function filterTable() {
            const mainType = document.getElementById('mainTaskType').value;
            const subType = document.getElementById('subTaskType').value;
            const mediaType = document.getElementById('mediaType').value;
            const statusValue = document.getElementById('taskStatus').value;

            // 当前登录用户名（取自顶部导航栏）
            const currentUser = '卢佩诗';

            // 过滤数据
            let filtered = taskData.filter(item => {
                // 默认仅显示本人创建的任务
                if (item.creator !== currentUser) return false;

                // 主任务类型过滤
                if (mainType && !(
                    (mainType === 'material' && item.mainType === '素材关停任务') ||
                    (mainType === 'ad_config' && item.mainType === '广告配置批量调整任务')
                )) return false;

                // 媒体类型过滤
                if (mediaType && item.mediaValue !== mediaType) return false;

                // 子任务类型过滤
                if (subType && item.subType !== subType) return false;

                // 任务状态过滤
                if (statusValue) {
                    const statusMap = {
                        'pending': '等待执行',
                        'running': '正在执行',
                        'completed': '已完成',
                        'partial_success': '部分成功',
                        'cancelled': '已取消',
                        'failed': '失败'
                    };
                    if (item.status !== statusMap[statusValue]) return false;
                }

                return true;
            });

            // 渲染表格
            renderTable(filtered);
        }

        // 渲染表格数据
        function renderTable(data) {
            const tbody = document.getElementById('taskTableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" class="px-4 py-8 text-center text-gray-400">
                            <i class="fa fa-inbox text-3xl mb-2 block"></i>
                            暂无符合条件的数据
                        </td>
                    </tr>`;
                updatePagination(0, 0, 1);
                return;
            }

            const mediaColorMap = {
                '头条': 'bg-blue-100 text-blue-600',
                '腾讯': 'bg-green-100 text-green-600'
            };

            tbody.innerHTML = data.map(item => `
                <tr class="border-b border-gray-200 hover:bg-gray-50">
                    <td class="px-4 py-3">${item.id}</td>
                    <td class="px-4 py-3 font-medium">${item.mainType}</td>
                    <td class="px-4 py-3">${item.subType}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-0.5 ${mediaColorMap[item.mediaType] || ''} rounded text-xs">${item.mediaType}</span>
                    </td>
                    <td class="px-4 py-3">
                        <span class="inline-flex items-center justify-center min-w-[28px] h-6 px-2 bg-blue-50 text-blue-600 text-sm font-medium rounded-full">${item.targetCount || 0}</span>
                    </td>
                    <td class="px-4 py-3">${item.createTime}</td>
                    <td class="px-4 py-3">${item.creator}</td>
                    <td class="px-4 py-3 w-32">
                        <div class="flex items-center">
                            <div class="progress-bar flex-1 mr-2">
                                <div class="progress-bar-fill" style="width: ${item.progress}%"></div>
                            </div>
                            <span class="text-xs">${item.progress}%</span>
                        </div>
                    </td>
                    <td class="px-4 py-3">
                        <span class="status-tag ${item.statusClass}">${item.status}</span>
                    </td>
                    <td class="px-4 py-3">
                        <a href="#" class="text-gray-400 hover:text-gray-600 mr-3">重试</a>
                        <a href="#" class="text-blue-600 hover:text-blue-800 detail-link" data-task-id="${item.id}">详情</a>
                    </td>
                </tr>`).join('');

            updatePagination(data.length, data.length, 1);
        }

        // 更新分页信息
        function updatePagination(total, currentTotal, page) {
            const pageInfo = document.querySelector('.flex.justify-end.items-center.p-4 span');
            if (pageInfo) {
                pageInfo.textContent = `第 1-${currentTotal} 条/总共 ${total} 条`;
            }
        }

        /**
         * 打开任务详情侧边栏
         * @param {number} taskId - 任务ID
         */
        function openDetailSidebar(taskId) {
            const taskItem = taskData.find(t => t.id === taskId);
            if (!taskItem) return;

            const sidebar = document.getElementById('taskDetailSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const content = document.getElementById('detailContent');

            let html = '';

            // 判断主任务类型，渲染不同的详情模板
            if (taskItem.mainType === '素材关停任务') {
                html = renderMaterialDetail(taskId);
            } else if (taskItem.mainType === '广告配置批量调整任务') {
                html = renderAdConfigDetail(taskId);
            }

            content.innerHTML = html;
            
            // 显示侧边栏和遮罩
            sidebar.classList.remove('translate-x-full');
            overlay.classList.remove('hidden');

            // 绑定批次行展开/收起事件
            bindBatchToggleEvents();
        }

        /** 关闭详情侧边栏 */
        function closeDetailSidebar() {
            const sidebar = document.getElementById('taskDetailSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.add('translate-x-full');
            overlay.classList.add('hidden');
        }

                                    const aFail = a.progress < 100 || a.status === '失败';

         * @param {string|number|null} target - 目标标识或页码索引
         */
        function highlightPrototypeArea(target) {
            // 先清除之前的高亮
            clearPrototypeHighlight();

            if (target === null || target === undefined) return; // 概述页不高亮

            let selector = '';
            let labelText = '';

            switch(target) {
                case 'filter-area':
                case 1:
                    selector = '.bg-white.rounded.shadow-sm.p-4.mb-4'; // 筛选栏容器
                    labelText = '① 筛选联动区域';

                    selector = 'main.flex-1.p-4.overflow-auto';
                    labelText = '③ 筛选栏 + 数据表格';
                    break;
                case 'sidebar':

                    // 侧边栏：优先高亮已打开的详情侧边栏本身
                    const sidebarEl = document.getElementById('taskDetailSidebar');
                    if (sidebarEl && !sidebarEl.classList.contains('translate-x-full')) {
                        createHighlightOverlay(sidebarEl.getBoundingClientRect(), '④ 任务详情侧边栏');

                position: fixed;
                left: ${rect.left - 3}px;
                top: ${rect.top - 3}px;
                width: ${rect.width + 6}px;
                height: ${rect.height + 6}px;
                border: 3px solid #3b82f6;
                border-radius: 10px;
                background-color: rgba(59, 130, 246, 0.06);
                pointer-events: none;
                z-index: 160;
                transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.25), inset 0 0 15px rgba(59, 130, 246, 0.08);
                animation: protoPulse 2s ease-in-out infinite;
            `;
            // 标签
            const label = document.createElement('div');
            label.style.cssText = `
                position: absolute;
                top: -28px;
                left: 8px;
                background: #3b82f6;
                color: white;
                font-size: 12px;
                font-weight: 600;
                padding: 3px 10px;
                border-radius: 4px 4px 0 0;
                white-space: nowrap;
                letter-spacing: 0.3px;
            `;
            label.textContent = labelText;
            overlay.appendChild(label);
            document.body.appendChild(overlay);
            currentHighlightEl = overlay;
        }

        // 清除原型高亮
        function clearPrototypeHighlight() {
            if (currentHighlightEl && currentHighlightEl.parentNode) {
                currentHighlightEl.remove();
            }
            currentHighlightEl = null;
        }

        // 更新圆点导航
        function updateReqDots() {
            const container = document.getElementById('reqDocDots');
            container.innerHTML = reqDocPages.map((_, i) =>
                `<span class="w-2 h-2 rounded-full ${i === reqCurrentPage ? 'bg-blue-500 active' : 'bg-gray-300 hover:bg-gray-400'}"
                      onclick="goToReqPage(${i})"></span>`
            ).join('');
        }

        // 跳转到指定页
        function goToReqPage(idx) {
            if (idx >= 0 && idx < reqDocPages.length) {
                reqCurrentPage = idx;
                renderReqDocPage(reqCurrentPage);
            }
        }

        // 收起/展开面板
        function toggleReqDocPanel() {
            isMinimized = !isMinimized;
            const panel = document.getElementById('reqDocPanel');
            const body = document.getElementById('reqDocBody');
            const header = document.getElementById('reqDocHeader');
            const collapsedBar = document.getElementById('reqDocCollapsedBar');
            const collapseBtn = document.querySelector('#reqDocCollapse i');

            if (isMinimized) {
                // 收起：只保留标题条（可拖动）
                body.classList.add('hidden');
                header.classList.add('hidden');
                collapsedBar.classList.remove('hidden');
                panel.style.width = '300px';
                panel.style.borderRadius = '8px';
                collapseBtn.classList.remove('fa-chevron-down');
                collapseBtn.classList.add('fa-chevron-up');
                // 收起时清除高亮，避免遮挡视线
                clearPrototypeHighlight();
            } else {
                // 展开
                body.classList.remove('hidden');
                header.classList.remove('hidden');
                collapsedBar.classList.add('hidden');
                panel.style.width = '400px';
                panel.style.borderRadius = '8px';
                collapseBtn.classList.remove('fa-chevron-up');
                collapseBtn.classList.add('fa-chevron-down');
                // 展开时恢复当前页的高亮
                const currentPage = reqDocPages[reqCurrentPage];
                highlightPrototypeArea(currentPage.highlightTarget || reqCurrentPage);
            }
        }

        // 初始化需求文档面板
        function initReqDocPanel() {
            const panel = document.getElementById('reqDocPanel');
            const header = document.getElementById('reqDocHeader');
            const collapsedBar = document.getElementById('reqDocCollapsedBar');

            // --- 注入高亮动画样式 ---
            const styleSheet = document.createElement('style');
            styleSheet.textContent = `
                @keyframes protoPulse {
                    0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.25), inset 0 0 15px rgba(59, 130, 246, 0.08); }
                    50% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.4), inset 0 0 20px rgba(59, 130, 246, 0.12); border-color: #60a5fa; }
                }
            `;
            document.head.appendChild(styleSheet);

            // --- 拖动逻辑（支持展开头部 + 收起标题条） ---
            let isDragging = false;
            let dragOffsetX = 0, dragOffsetY = 0;

            function startDrag(e) {
                if (e.target.closest('#reqDocCollapse') || e.target.closest('#reqDocClose')) return;
                isDragging = true;
                const rect = panel.getBoundingClientRect();
                dragOffsetX = e.clientX - rect.left;
                dragOffsetY = e.clientY - rect.top;
                panel.style.transition = 'none';
                e.preventDefault();
            }

            header.addEventListener('mousedown', startDrag);
            collapsedBar.addEventListener('mousedown', startDrag);

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                let newX = e.clientX - dragOffsetX;
                let newY = e.clientY - dragOffsetY;
                newX = Math.max(0, Math.min(newX, window.innerWidth - panel.offsetWidth));
                newY = Math.max(0, Math.min(newY, window.innerHeight - 20));
                panel.style.left = newX + 'px';
                panel.style.top = newY + 'px';
                panel.style.right = 'auto';

                // 拖动时重新定位高亮
                if (currentHighlightEl && !isMinimized) {
                    clearPrototypeHighlight();
                    const currentPage = reqDocPages[reqCurrentPage];
                    setTimeout(() => highlightPrototypeArea(currentPage.highlightTarget || reqCurrentPage), 50);
                }
            });

            document.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    panel.style.transition = '';
                }
            });

            // --- 翻页按钮 ---
            document.getElementById('reqPrevPage').addEventListener('click', () => goToReqPage(reqCurrentPage - 1));
            document.getElementById('reqNextPage').addEventListener('click', () => goToReqPage(reqCurrentPage + 1));

            // --- 收起/展开 ---
            document.getElementById('reqDocCollapse').addEventListener('click', toggleReqDocPanel);

            // --- 关闭 ---
            document.getElementById('reqDocClose').addEventListener('click', function() {
                panel.style.display = 'none';
                clearPrototypeHighlight();
            });

            // 初始渲染第1页
            renderReqDocPage(0);
        }

        // DOMReady 时初始化
        document.addEventListener('DOMContentLoaded', initReqDocPanel);
    </script>
</body>
</html>
